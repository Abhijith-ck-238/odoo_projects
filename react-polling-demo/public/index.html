<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Polling Demo - Short vs Long Polling</title>
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { border-bottom: 2px solid #38bdf8; color: #38bdf8; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- Components ---

        const Badge = ({ type }) => {
            const colors = {
                'Short Polling': 'bg-blue-500/10 text-blue-400 border-blue-500/20',
                'Long Polling': 'bg-purple-500/10 text-purple-400 border-purple-500/20'
            };
            return (
                <span className={`px-2 py-1 rounded text-xs font-medium border ${colors[type]}`}>
                    {type}
                </span>
            );
        };

        const NotificationItem = ({ message, time }) => (
            <div className="flex items-start gap-3 p-3 glass rounded-lg mb-3 border-l-4 border-blue-500 animate-in fade-in slide-in-from-right-4 duration-300">
                <div className="bg-blue-500/20 p-2 rounded-full">
                    <svg className="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </div>
                <div>
                    <p className="text-sm text-slate-200">{message}</p>
                    <p className="text-[10px] text-slate-500 mt-1">{time}</p>
                </div>
            </div>
        );

        const MessageItem = ({ text, time }) => (
            <div className="flex items-start gap-3 p-3 glass rounded-lg mb-3 border-l-4 border-purple-500 animate-in fade-in slide-in-from-left-4 duration-300">
                <div className="bg-purple-500/20 p-2 rounded-full">
                    <svg className="w-4 h-4 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                </div>
                <div>
                    <p className="text-sm text-slate-200">{text}</p>
                    <p className="text-[10px] text-slate-500 mt-1">{time}</p>
                </div>
            </div>
        );

        // --- Main App ---

        function App() {
            const [activeTab, setActiveTab] = useState('Short Polling');
            const [notifications, setNotifications] = useState([]);
            const [messages, setMessages] = useState([]);
            const [isPollingLong, setIsPollingLong] = useState(false);
            const [lastPollTime, setLastPollTime] = useState(null);

            // --- Short Polling Logic ---
            const fetchNotifications = useCallback(async () => {
                try {
                    const response = await fetch("/api/notifications");
                    const data = await response.json();
                    setNotifications(data.reverse());
                    setLastPollTime(new Date().toLocaleTimeString());
                } catch (error) {
                    console.error("Error fetching notifications:", error);
                }
            }, []);

            useEffect(() => {
                fetchNotifications();
                const interval = setInterval(fetchNotifications, 5000);
                return () => clearInterval(interval);
            }, [fetchNotifications]);

            // --- Long Polling Logic ---
            const startLongPolling = useCallback(async () => {
                setIsPollingLong(true);
                try {
                    const response = await fetch("/api/messages/subscribe");
                    if (response.status === 204) {
                        // Timeout, re-poll
                        startLongPolling();
                        return;
                    }
                    const data = await response.json();
                    setMessages((prev) => [{...data, time: new Date().toLocaleTimeString()}, ...prev]);
                    startLongPolling();
                } catch (error) {
                    console.error("Polling error:", error);
                    setTimeout(startLongPolling, 3000);
                }
            }, []);

            useEffect(() => {
                startLongPolling();
            }, [startLongPolling]);

            // --- Control Panel Handlers ---
            const triggerNotification = async () => {
                await fetch('/api/trigger-notification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "New live notification!" })
                });
            };

            const triggerMessage = async () => {
                await fetch('/api/trigger-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: "Urgent message sent via long polling!" })
                });
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-12">
                    <header className="mb-12 text-center">
                        <h1 className="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent mb-4">
                            Polling in React Masterclass
                        </h1>
                        <p className="text-slate-400 max-w-xl mx-auto">
                            Experience the difference between Short Polling (intervals) and Long Polling (hanging requests).
                        </p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {/* Control Panel */}
                        <div className="md:col-span-1">
                            <div className="glass p-6 rounded-2xl sticky top-8">
                                <h2 className="text-xl font-semibold mb-6 flex items-center gap-2">
                                    <svg className="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                                    </svg>
                                    Control Panel
                                </h2>
                                
                                <div className="space-y-4">
                                    <button 
                                        onClick={triggerNotification}
                                        className="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20"
                                    >
                                        Trigger Notification
                                    </button>
                                    <p className="text-[11px] text-slate-500 text-center">Will appear in Short Polling after current interval</p>
                                    
                                    <div className="h-px bg-slate-700/50 my-4"></div>

                                    <button 
                                        onClick={triggerMessage}
                                        className="w-full bg-purple-600 hover:bg-purple-500 text-white font-medium py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-purple-500/20"
                                    >
                                        Send Message
                                    </button>
                                    <p className="text-[11px] text-slate-500 text-center">Will appear instantly via Long Polling</p>
                                </div>

                                <div className="mt-8 pt-6 border-t border-slate-700/50">
                                    <div className="flex items-center justify-between text-xs text-slate-500 mb-2">
                                        <span>Server Status:</span>
                                        <span className="text-green-400 flex items-center gap-1">
                                            <span className="w-2 h-2 rounded-full bg-green-400 pulse"></span>
                                            Online
                                        </span>
                                    </div>
                                    <div className="text-[10px] text-slate-600 font-mono overflow-hidden truncate">
                                        Last short-poll: {lastPollTime || 'Waiting...'}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Demo Area */}
                        <div className="md:col-span-2">
                            <div className="glass rounded-2xl overflow-hidden min-h-[500px] flex flex-col">
                                <div className="flex border-b border-slate-700/50">
                                    <button 
                                        onClick={() => setActiveTab('Short Polling')}
                                        className={`flex-1 py-4 text-sm font-medium transition-colors ${activeTab === 'Short Polling' ? 'tab-active bg-blue-500/5' : 'text-slate-500 hover:text-slate-300'}`}
                                    >
                                        Short Polling (Notifications)
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('Long Polling')}
                                        className={`flex-1 py-4 text-sm font-medium transition-colors ${activeTab === 'Long Polling' ? 'tab-active bg-purple-500/5' : 'text-slate-500 hover:text-slate-300'}`}
                                    >
                                        Long Polling (Messages)
                                    </button>
                                </div>

                                <div className="p-6 flex-1 overflow-y-auto">
                                    {activeTab === 'Short Polling' ? (
                                        <div className="space-y-4">
                                            <div className="flex items-center justify-between mb-4">
                                                <Badge type="Short Polling" />
                                                <span className="text-[10px] text-slate-500 uppercase tracking-wider font-semibold italic">5s Interval</span>
                                            </div>
                                            {notifications.length > 0 ? (
                                                notifications.map((n) => (
                                                    <NotificationItem key={n.id} message={n.message} time="Latest update" />
                                                ))
                                            ) : (
                                                <p className="text-slate-500 text-center py-12 italic">No notifications yet...</p>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="flex items-center justify-between mb-4">
                                                <Badge type="Long Polling" />
                                                <span className="text-[10px] text-slate-500 uppercase tracking-wider font-semibold italic">Open Connection</span>
                                            </div>
                                            {messages.length > 0 ? (
                                                messages.map((m, i) => (
                                                    <MessageItem key={i} text={m.text} time={m.time} />
                                                ))
                                            ) : (
                                                <p className="text-slate-500 text-center py-12 italic">No messages yet...</p>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="mt-16 text-center text-slate-600 text-sm">
                        <p>&copy; 2026 Polling Masterclass Implementation. Built with ❤️ for testing.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
